# ============================================================
# SCALPER — Maximum Trade Frequency
# ============================================================
# Philosophy: Trade often, catch every micro-momentum shift.
# Ultra-fast MACD catches crossovers every 3-8 minutes.
# Minimal filters — let risk management handle losers.
# Small positions (3%) compensate for high frequency.
# Expected: 8-15+ trades/day, ~48-52% win rate,
#   profit comes from volume + tight SL cutting losses fast.
# ============================================================

market:
  token_id: ""
  polling_interval_seconds: 8
  network: "polygon-mainnet"

discovery:
  enabled: true
  query: "Bitcoin Up or Down"
  coin_slug_prefix: "btc-"
  limit: 50
  gamma_api: "https://gamma-api.polymarket.com"

strategy:
  name: "Scalper"
  timeframe: "1m"
  parameters:
    fast_ema: 5
    slow_ema: 13
    signal_smoothing: 4
  indicators:
    - name: "MACD"
      source: "pandas_ta"
    - name: "PriceSource"
      api: "Binance-REST"
  rsi:
    period: 10
    overbought: 75          # Very relaxed — only block at true extremes
    oversold: 25
  order_book:
    imbalance_threshold: 0.51   # Minimal filter — almost any imbalance passes
    depth_levels: 5
  entry_filters:
    trend_ema_period: 30         # Only trade in direction of EMA30 trend

risk_management:
  initial_balance_usd: 1000.0
  risk_per_trade_pct: 0.01      # Рискуем строго 1% в сделке
  max_daily_loss_pct: 0.04      # Дневной лимит 4%
  min_time_before_expiry_sec: 90
  max_time_before_expiry_sec: 350

  use_sl_tp: true               # Включено для фьючерсов
  use_hard_tp: true
  use_hard_sl: true

  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 3.0        
  atr_tp_multiplier: 4.5        

  sl_confirm_seconds: 10        # Быстрый выход для скальпера
  cooldown_after_sl_sec: 20     # Быстрый перезаход для скальпера

  trailing_stop_enabled: true
  trailing_stop_atr_multiplier: 1.5
  breakeven_atr_multiplier: 1.0 # Перевод в безубыток

trading:
  use_ws: true
  use_binance_ws: true
  binance_ws_candle_history: 300
  signal_confirmation_ticks: 2

simulation:
  state_file: "state_scalper.json"
  log_file: "trades_scalper.csv"
  slippage_simulation_pct: 0.001
  fee_simulation_pct: 0.000
  market_impact_factor: 0.002
  liquidity_fallback_usd: 1000.0
  partial_fill_min_pct: 0.85

endpoints:
  polymarket_clob: "https://clob.polymarket.com"
  binance_v3: "https://api.binance.com/api/v3"
  telegram_bot_token: "8602019058:AAFaJkXq2Uj8OyxC4lJ5dze1gf0fp5KDr6w"
  telegram_chat_id: "324521546"
