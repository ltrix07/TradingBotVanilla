# ============================================================
# VOLUME BREAKOUT — Trade Real Market Activity
# ============================================================
# Philosophy: Volume precedes price. A volume spike on Binance
# signals genuine market participation — institutions, news,
# or retail FOMO. Only trade MACD crossovers that coincide
# with above-average volume. No price filters — volume alone
# is the quality gate.
# Expected: 3-7 trades/day, ~53-57% win rate,
#   best during volatile sessions (US/EU overlap, news events).
# ============================================================

market:
  token_id: ""
  polling_interval_seconds: 10
  network: "polygon-mainnet"

discovery:
  enabled: true
  query: "Bitcoin Up or Down"
  coin_slug_prefix: "btc-"
  limit: 50
  gamma_api: "https://gamma-api.polymarket.com"

strategy:
  name: "VolumeBreakout"
  timeframe: "1m"
  parameters:
    fast_ema: 7
    slow_ema: 18
    signal_smoothing: 5
  indicators:
    - name: "MACD"
      source: "pandas_ta"
    - name: "PriceSource"
      api: "Binance-REST"
  rsi:
    period: 12
    overbought: 70
    oversold: 30
  order_book:
    imbalance_threshold: 0.53
    depth_levels: 5
  entry_filters:
    trend_ema_period: 40             # Only trade in direction of EMA40 trend
    require_volume_spike: true
    volume_spike_multiplier: 1.3     # Moderate threshold — catch real moves without over-filtering
    volume_spike_period: 10          # 10-candle average for stable baseline

risk_management:
  initial_balance_usd: 1000.0
  position_size_pct: 0.06       # 6% — moderate-to-high conviction
  max_daily_loss_pct: 0.12      # 12% daily limit
  min_time_before_expiry_sec: 100
  max_time_before_expiry_sec: 400

  use_sl_tp: true
  use_hard_tp: true
  use_hard_sl: true

  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 3.0        # SL beyond market noise
  atr_tp_multiplier: 4.5        # TP = 1.5x SL distance

  sl_confirm_seconds: 12        # Wait 12s to confirm SL breach is real, not a spike
  cooldown_after_sl_sec: 40

  trailing_stop_enabled: true
  trailing_stop_atr_multiplier: 1.5

trading:
  use_ws: true
  use_binance_ws: true
  binance_ws_candle_history: 300
  signal_confirmation_ticks: 2

simulation:
  state_file: "state_volume.json"
  log_file: "trades_volume.csv"
  slippage_simulation_pct: 0.001
  fee_simulation_pct: 0.000
  market_impact_factor: 0.002
  liquidity_fallback_usd: 1000.0
  partial_fill_min_pct: 0.85

endpoints:
  polymarket_clob: "https://clob.polymarket.com"
  binance_v3: "https://api.binance.com/api/v3"
  telegram_bot_token: "8602019058:AAFaJkXq2Uj8OyxC4lJ5dze1gf0fp5KDr6w"
  telegram_chat_id: "324521546"
