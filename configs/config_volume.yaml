# ============================================================
# VOLUME BREAKOUT — Trade Real Market Activity
# ============================================================
# Philosophy: Volume precedes price. Only trade MACD crossovers that
# coincide with above-average Binance volume. No price filters —
# volume alone is the quality gate. Moderate position size.
#
# Expected: 3–7 trades/day on BTCUSDT perp. Best during volatile
# sessions (US/EU overlap, news events).
# Works best when orchestrator's ADX is in the 20–35 range.
# ============================================================

execution:
  mode: "paper"

exchange:
  name: "binance_futures"
  symbol: "BTCUSDT"
  leverage: 5
  margin_mode: "isolated"
  testnet: false

market:
  polling_interval_seconds: 10

strategy:
  name: "VolumeBreakout"
  timeframe: "1m"
  parameters:
    fast_ema: 7
    slow_ema: 18
    signal_smoothing: 5
  indicators:
    - name: "MACD"
      source: "pandas_ta"
    - name: "PriceSource"
      api: "Binance-Futures-REST"
  rsi:
    period: 12
    overbought: 70
    oversold: 30
  order_book:
    imbalance_threshold: 0.53
    depth_levels: 5
  entry_filters:
    # 90 one-minute candles = 1.5h trend — balanced for medium regime
    trend_ema_period: 65
    require_volume_spike: true
    volume_spike_multiplier: 1.3    # catch real moves without over-filtering
    volume_spike_period: 10         # 10-candle stable baseline

risk_management:
  initial_balance_usd: 1000.0

  risk_per_trade_pct: 0.012    # 1.2% — moderate-to-high conviction
  position_size_pct: 0.06      # legacy fallback

  max_daily_loss_pct: 0.04

  use_sl_tp: true
  use_hard_tp: true
  use_hard_sl: true

  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 3.0
  atr_tp_multiplier: 4.5
  min_atr_pct: 0.0005           # Для 1m свечей: блокирует только мёртвый рынок
  min_sl_pct: 0.008            # Фикс C: minimum SL floor = 0.8%

  stop_loss_pct:   0.03
  take_profit_pct: 0.045

  sl_confirm_seconds: 12
  cooldown_after_sl_sec: 40

  trailing_stop_enabled: true
  trailing_stop_atr_multiplier: 1.5
  breakeven_atr_multiplier: 1.0

  max_hold_time_minutes: 120

  use_time_stop: true
  time_stop_seconds: 900
  time_stop_max_loss_pct: 0.005

  use_reverse_close: true

  max_funding_rate_bps: 50

  btc_price_fallback: 90000.0

trading:
  use_ws: true
  use_binance_ws: true
  binance_ws_candle_history: 300
  signal_confirmation_ticks: 2

simulation:
  state_file: "state_volume.json"
  log_file:   "trades_volume.csv"
  fee_simulation_pct:      0.0005
  slippage_simulation_pct: 0.0003
  market_impact_factor:    0.0005
  liquidity_fallback_usd:  50000.0
  partial_fill_min_pct:    0.90

endpoints:
  binance_futures:    "https://fapi.binance.com"
  binance_futures_ws: "wss://fstream.binance.com"
  telegram_bot_token: ""
  telegram_chat_id:   ""
  # Claude Opus 4.7 API key for daily review (prefer env var ANTHROPIC_API_KEY)
  anthropic_api_key:  ""
