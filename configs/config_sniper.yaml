# ============================================================
# SNIPER — High Conviction, Selective Entries
# ============================================================
# Philosophy: Fewer trades, each filtered through multiple layers —
# MACD crossover + long-period EMA trend + volume spike confirmation.
# Larger risk per trade since fewer opportunities pass the filters.
#
# Expected: 2–5 trades/day on BTCUSDT perp.
# Works best when orchestrator's ADX < 20 (range / low trend regime).
# ============================================================

execution:
  mode: "paper"

exchange:
  name: "binance_futures"
  symbol: "BTCUSDT"
  leverage: 5
  margin_mode: "isolated"
  testnet: false

market:
  polling_interval_seconds: 10

strategy:
  name: "Sniper"
  timeframe: "1m"
  parameters:
    fast_ema: 10
    slow_ema: 26
    signal_smoothing: 8
  indicators:
    - name: "MACD"
      source: "pandas_ta"
    - name: "PriceSource"
      api: "Binance-Futures-REST"
  rsi:
    period: 14
    overbought: 65            # stricter than trend — reject stretched moves
    oversold: 35
  order_book:
    imbalance_threshold: 0.56
    depth_levels: 5
  entry_filters:
    # 120 one-minute candles = 2h trend — heavy filter, rare but high-quality entries
    trend_ema_period: 120
    require_volume_spike: true
    volume_spike_multiplier: 1.3
    volume_spike_period: 8

risk_management:
  initial_balance_usd: 1000.0

  # Slightly higher risk per trade since fewer signals pass the filters
  risk_per_trade_pct: 0.015    # 1.5% per high-conviction trade
  position_size_pct: 0.08      # legacy fallback

  max_daily_loss_pct: 0.04     # prop firm standard (use 0.10 for personal)

  use_sl_tp: true
  use_hard_tp: true
  use_hard_sl: true

  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 3.0
  atr_tp_multiplier: 4.5

  stop_loss_pct:   0.03
  take_profit_pct: 0.045

  sl_confirm_seconds: 15
  cooldown_after_sl_sec: 60    # patient re-entry after loss

  trailing_stop_enabled: true
  trailing_stop_atr_multiplier: 1.5
  breakeven_atr_multiplier: 1.0

  max_hold_time_minutes: 180   # sniper can hold longer — patient plays

  use_time_stop: true
  time_stop_seconds: 1200      # 20 min
  time_stop_max_loss_pct: 0.005

  use_reverse_close: true

  max_funding_rate_bps: 50

  btc_price_fallback: 90000.0

trading:
  use_ws: true
  use_binance_ws: true
  binance_ws_candle_history: 300
  signal_confirmation_ticks: 2

simulation:
  state_file: "state_sniper.json"
  log_file:   "trades_sniper.csv"
  fee_simulation_pct:      0.0005
  slippage_simulation_pct: 0.0003
  market_impact_factor:    0.0005
  liquidity_fallback_usd:  50000.0
  partial_fill_min_pct:    0.90

endpoints:
  binance_futures:    "https://fapi.binance.com"
  binance_futures_ws: "wss://fstream.binance.com"
  telegram_bot_token: ""
  telegram_chat_id:   ""
  # Claude Opus 4.7 API key for daily review (prefer env var ANTHROPIC_API_KEY)
  anthropic_api_key:  ""
