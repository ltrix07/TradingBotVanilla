# ============================================================
# BALANCED — Golden Middle
# ============================================================
# Philosophy: Classic MACD with meaningful confirmations.
# Moderate frequency — not too picky, not too loose.
# Standard position sizing with balanced R:R ratio (1:1.7).
# Book imbalance at 0.55 adds real confirmation value.
# Expected: 4-8 trades/day, ~52-55% win rate,
#   consistent performance across market conditions.
# ============================================================

market:
  token_id: ""
  polling_interval_seconds: 10
  network: "polygon-mainnet"

discovery:
  enabled: true
  query: "Bitcoin Up or Down"
  coin_slug_prefix: "btc-"
  limit: 50
  gamma_api: "https://gamma-api.polymarket.com"

strategy:
  name: "Balanced"
  timeframe: "1m"
  parameters:
    fast_ema: 8
    slow_ema: 21
    signal_smoothing: 6
  indicators:
    - name: "MACD"
      source: "pandas_ta"
    - name: "PriceSource"
      api: "Binance-REST"
  rsi:
    period: 14
    overbought: 68
    oversold: 32
  order_book:
    imbalance_threshold: 0.55   # Meaningful confirmation — needs real buying/selling pressure
    depth_levels: 5
  entry_filters:
    trend_ema_period: 50         # Only trade in direction of EMA50 trend

risk_management:
  initial_balance_usd: 1000.0
  risk_per_trade_pct: 0.01      # Рискуем строго 1% в сделке
  max_daily_loss_pct: 0.04      # Дневной лимит 4%
  min_time_before_expiry_sec: 100
  max_time_before_expiry_sec: 400

  use_sl_tp: true               # Включено для фьючерсов
  use_hard_tp: true
  use_hard_sl: true

  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 3.0        
  atr_tp_multiplier: 4.5        

  sl_confirm_seconds: 15        
  cooldown_after_sl_sec: 45

  trailing_stop_enabled: true
  trailing_stop_atr_multiplier: 1.5
  breakeven_atr_multiplier: 1.0 # Перевод в безубыток

trading:
  use_ws: true
  use_binance_ws: true
  binance_ws_candle_history: 300
  signal_confirmation_ticks: 2

simulation:
  state_file: "state_balanced.json"
  log_file: "trades_balanced.csv"
  slippage_simulation_pct: 0.001
  fee_simulation_pct: 0.000
  market_impact_factor: 0.002
  liquidity_fallback_usd: 1000.0
  partial_fill_min_pct: 0.85

endpoints:
  polymarket_clob: "https://clob.polymarket.com"
  binance_v3: "https://api.binance.com/api/v3"
