# ============================================================
# TREND RIDER — Ride Momentum, Lock Profits
# ============================================================
# Philosophy: Enter only on clear directional moves confirmed by strong
# order-book imbalance. Once in, let the trade run with a wide ATR-based
# TP and an aggressive trailing stop that locks profits as price moves
# in our favor. Breakeven stop activates after 1×ATR of profit.
#
# Expected: 3–6 trades/day on BTCUSDT perp, larger winners due to wide TP.
# Works best when orchestrator's ADX > 35 (strong trend regime).
# ============================================================

# ── Execution mode ───────────────────────────────────────────
execution:
  mode: "paper"            # "paper" | "live" — live delegates to binance_client.py

# ── Exchange / instrument ────────────────────────────────────
exchange:
  name: "binance_futures"
  symbol: "BTCUSDT"
  leverage: 5
  margin_mode: "isolated"  # "isolated" | "cross"
  testnet: false           # flip to true to use testnet.binancefuture.com when going live
  # api_key: ""            # prefer env var BINANCE_API_KEY in live mode
  # api_secret: ""         # prefer env var BINANCE_API_SECRET in live mode

# ── Market / polling ─────────────────────────────────────────
market:
  polling_interval_seconds: 10

# ── Strategy ─────────────────────────────────────────────────
strategy:
  name: "TrendRider"
  timeframe: "1m"
  parameters:
    fast_ema: 8
    slow_ema: 20
    signal_smoothing: 5
  indicators:
    - name: "MACD"
      source: "pandas_ta"
    - name: "PriceSource"
      api: "Binance-Futures-REST"
  rsi:
    period: 14
    overbought: 72            # relaxed — allow riding strong trends
    oversold: 28
  order_book:
    imbalance_threshold: 0.58  # strict — require clear order-flow direction
    depth_levels: 5
  entry_filters:
    # 60 one-minute candles = 1h trend, longer than a typical trade cycle.
    # Too short EMA (40 as before) stops filtering counter-trend signals.
    trend_ema_period: 45
    trend_ema_buffer_pct: 0.0035

# ── Risk management ──────────────────────────────────────────
risk_management:
  initial_balance_usd: 1000.0

  # Risk-based sizing: each trade risks this fraction of balance
  # when SL triggers. qty = (balance * risk_per_trade_pct) / sl_distance.
  risk_per_trade_pct: 0.01     # 1% per trade

  # Legacy fallback if risk_per_trade_pct is not provided
  position_size_pct: 0.05

  # Prop firm standard: 4%. For personal account use 0.10.
  max_daily_loss_pct: 0.04

  # SL/TP gating
  use_sl_tp: true
  use_hard_tp: true            # checks WS extremums between polls for precise TP
  use_hard_sl: true

  # ATR-driven dynamic SL/TP (overrides fixed stop_loss_pct / take_profit_pct below)
  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 3.0       # SL = 3 × ATR beyond entry
  atr_tp_multiplier: 4.5       # TP = 4.5 × ATR (R:R ≈ 1.5)
  min_atr_pct: 0.0005           # Для 1m свечей: блокирует только мёртвый рынок
  min_sl_pct: 0.008            # Фикс C: minimum SL floor = 0.8%

  # Used only when use_atr_dynamic is false
  stop_loss_pct:   0.03
  take_profit_pct: 0.045

  sl_confirm_seconds: 15       # wait 15s to confirm SL breach is real, not a wick
  cooldown_after_sl_sec: 60    # patient re-entry after a stopout

  # Trailing stop (price floor for LONG, ceiling for SHORT)
  trailing_stop_enabled: true
  trailing_stop_atr_multiplier: 1.5

  # Breakeven: move stop to entry_price once profit ≥ N×ATR
  # Set to 0 to disable.
  breakeven_atr_multiplier: 1.0

  # Max time to hold a position regardless of PnL (safety cap)
  # Replaces the Polymarket "expiry" concept.
  max_hold_time_minutes: 120

  # Time-stop: close a stale position stuck in the dead-zone
  use_time_stop: true
  time_stop_seconds: 900       # 15 min
  time_stop_max_loss_pct: 0.005

  # Reverse-close: flip out if MACD gives the opposite signal
  use_reverse_close: true

  # Funding-rate guard: skip entries when funding makes the side unprofitable
  # bps = 1/10000 of mark price per 8h funding cycle.
  # At 50 bps per 8h (0.5%), funding alone costs ~1.5%/day if held 24h.
  max_funding_rate_bps: 50

  # BTC price fallback for normalize_atr when last_close is unavailable
  btc_price_fallback: 90000.0

# ── WebSocket / tick feed ────────────────────────────────────
trading:
  use_ws: true                 # enable WS depth feed
  use_binance_ws: true         # enable aggTrade candle builder
  binance_ws_candle_history: 300
  signal_confirmation_ticks: 2

# ── Paper-mode simulation ────────────────────────────────────
simulation:
  state_file: "state_trend.json"
  log_file:   "trades_trend.csv"

  # Binance Futures fees: 0.04% taker, 0.02% maker per side.
  # 0.0005 = 0.05%, roughly equal to maker-taker round trip.
  # Setting this to 0 inflates paper-mode PnL vs. reality.
  fee_simulation_pct: 0.0005

  slippage_simulation_pct: 0.0003   # BTC spread / 2 on tight books
  market_impact_factor: 0.0005
  liquidity_fallback_usd: 50000.0   # realistic BTC perp top-of-book liquidity
  partial_fill_min_pct: 0.90        # market orders fill fully on liquid books

# ── Endpoints ────────────────────────────────────────────────
endpoints:
  binance_futures:    "https://fapi.binance.com"
  binance_futures_ws: "wss://fstream.binance.com"
  # Telegram alerts (kill-switch + future notifications)
  telegram_bot_token: ""
  telegram_chat_id:   ""
  # Claude Opus 4.7 API key for daily review (prefer env var ANTHROPIC_API_KEY)
  anthropic_api_key:  ""
