# ============================================================
# Crypto Futures Paper Trading Bot — Funding Rate Contrarian
# ============================================================
# Strategy: Enter contrarian to extreme funding rates.
#   - High positive funding → SHORT (longs pay shorts, we collect)
#   - High negative funding → LONG  (shorts pay longs, we collect)
#
# Two profit sources:
#   1. Directional mean-reversion (crowded positioning unwinds)
#   2. Funding payment collection (we're always on receiving side)
#
# Expected: 1-3 trades/day during volatile funding periods.
# Best when market is trending with high open interest and leverage.
# ============================================================

execution:
  mode: "paper"               # "paper" | "live"

exchange:
  name: "binance_futures"
  symbol: "BTCUSDT"
  leverage: 5
  margin_mode: "isolated"
  testnet: false

market:
  polling_interval_seconds: 30   # funding rate changes slowly — no need to poll fast

strategy:
  name: "FundingContrarian"
  timeframe: "1m"                # candles still used for ATR calculation
  funding:
    # Signal threshold: enter when |funding_rate| exceeds this value (in bps).
    # Binance normal range is -10 to +10 bps. Extremes reach 50-100+ bps.
    # Lower = more trades but weaker signal. Higher = fewer but higher conviction.
    # 25 bps = 0.25% per 8h → roughly 5-15 extreme events per month.
    threshold_bps: 25

  # Indicators used for ATR (price data), not for signal generation
  indicators:
    - name: "PriceSource"
      api: "Binance-Futures-REST"

  # Order book config (still used for entry/exit pricing, not signal)
  order_book:
    depth_levels: 5

risk_management:
  initial_balance_usd: 1000.0
  risk_per_trade_pct: 0.015      # 1.5% — higher conviction per trade (fewer trades)
  position_size_pct: 0.08        # legacy fallback
  max_daily_loss_pct: 0.04       # prop firm standard: 4%

  use_sl_tp: true
  use_hard_tp: true
  use_hard_sl: true

  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 3.5         # wider SL — funding trades need room to breathe
  atr_tp_multiplier: 5.0         # wider TP — let winners run (R:R ≈ 1.43)
  min_atr_pct: 0.0005            # block only dead-flat market
  min_sl_pct: 0.008              # minimum SL floor = 0.8%

  # Fallback fixed SL/TP (used when ATR unavailable)
  stop_loss_pct:   0.03
  take_profit_pct: 0.045

  sl_confirm_seconds: 20         # longer confirmation — funding trades are patient
  cooldown_after_sl_sec: 120     # 2 min cooldown after SL (funding changes slowly)

  trailing_stop_enabled: true
  trailing_stop_atr_multiplier: 2.0
  breakeven_atr_multiplier: 1.5  # protect entry after 1.5×ATR profit

  # Hold time: funding settlement is every 8h.
  # 480 min = 8h covers one full funding cycle.
  max_hold_time_minutes: 480
  use_time_stop: true
  time_stop_seconds: 3600        # 1h dead-zone cutoff (no SL/TP progress)
  time_stop_max_loss_pct: 0.005
  use_reverse_close: true        # close if funding rate flips to opposite extreme

  # Funding guard DISABLED — funding IS our signal, not a blocker.
  # We always enter on the collecting side, so funding cost = 0.
  max_funding_rate_bps: 0

  btc_price_fallback: 90000.0

trading:
  use_ws: true
  use_binance_ws: true
  binance_ws_candle_history: 300
  signal_confirmation_ticks: 2

simulation:
  state_file: "state.json"
  log_file:   "trades.csv"
  fee_simulation_pct:      0.0005
  slippage_simulation_pct: 0.0003
  market_impact_factor:    0.0005
  liquidity_fallback_usd:  50000.0
  partial_fill_min_pct:    0.90

endpoints:
  binance_futures:    "https://fapi.binance.com"
  binance_futures_ws: "wss://fstream.binance.com"
  telegram_bot_token: ""
  telegram_chat_id:   ""
  anthropic_api_key:  ""
