# ============================================================
# Crypto Futures Paper Trading Bot — default config
# ============================================================
# This file is the default config when running `python src/main.py` directly,
# without the orchestrator. The orchestrator uses configs/config_hybrid.yaml
# (regenerated at runtime from configs/config_{sniper,volume,trend}.yaml).
#
# Start here: this config mirrors `config_balanced.yaml` — a reasonable
# all-rounder for testing the full pipeline without strategy-specific tuning.
# ============================================================

execution:
  mode: "paper"               # "paper" | "live"

exchange:
  name: "binance_futures"
  symbol: "BTCUSDT"
  leverage: 5
  margin_mode: "isolated"
  testnet: false
  # For live mode, prefer reading these from env:
  # api_key:    ""
  # api_secret: ""

market:
  polling_interval_seconds: 10

strategy:
  name: "Default"
  timeframe: "1m"
  parameters:
    fast_ema: 8
    slow_ema: 21
    signal_smoothing: 6
  indicators:
    - name: "MACD"
      source: "pandas_ta"
    - name: "PriceSource"
      api: "Binance-Futures-REST"
  rsi:
    period: 14
    overbought: 68
    oversold: 32
  order_book:
    imbalance_threshold: 0.55
    depth_levels: 5
  entry_filters:
    trend_ema_period: 75

risk_management:
  initial_balance_usd: 1000.0
  risk_per_trade_pct: 0.01
  position_size_pct: 0.05
  max_daily_loss_pct: 0.04

  use_sl_tp: true
  use_hard_tp: true
  use_hard_sl: true

  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 3.0
  atr_tp_multiplier: 4.5

  stop_loss_pct:   0.03
  take_profit_pct: 0.045

  sl_confirm_seconds: 15
  cooldown_after_sl_sec: 45

  trailing_stop_enabled: true
  trailing_stop_atr_multiplier: 1.5
  breakeven_atr_multiplier: 1.0

  max_hold_time_minutes: 120
  use_time_stop: true
  time_stop_seconds: 900
  time_stop_max_loss_pct: 0.005
  use_reverse_close: true

  max_funding_rate_bps: 50
  btc_price_fallback: 90000.0

trading:
  use_ws: true
  use_binance_ws: true
  binance_ws_candle_history: 300
  signal_confirmation_ticks: 2

simulation:
  state_file: "state.json"
  log_file:   "trades.csv"
  fee_simulation_pct:      0.0005
  slippage_simulation_pct: 0.0003
  market_impact_factor:    0.0005
  liquidity_fallback_usd:  50000.0
  partial_fill_min_pct:    0.90

endpoints:
  binance_futures:    "https://fapi.binance.com"
  binance_futures_ws: "wss://fstream.binance.com"
  telegram_bot_token: ""
  telegram_chat_id:   ""
  # Claude Opus 4.7 API key for daily review (scripts/daily_review.py).
  # Prefer env var ANTHROPIC_API_KEY instead of committing to this file.
  anthropic_api_key:  ""
