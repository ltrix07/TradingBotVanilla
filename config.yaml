# ============================================================
# Crypto Futures Paper Trading Bot -- Volatility Breakout
# ============================================================
# Strategy: Enter on Bollinger Band squeeze breakout.
#   - BB bandwidth compresses (squeeze) -> volatility about to expand
#   - Price breaks above upper BB -> LONG
#   - Price breaks below lower BB -> SHORT
#
# Backtested on BTC/ETH/SOL, 6-12 months, 9000 configs.
# Best config: bb=22, squeeze_bw=2.0, sl_atr=1.75, tp_atr=4.0
# Result: +31% compound (6mo, $100K, 1.5% risk, 5x leverage)
# ============================================================

execution:
  mode: "paper"               # "paper" | "live"

exchange:
  name: "binance_futures"
  symbol: "BTCUSDT"
  leverage: 5
  margin_mode: "isolated"
  testnet: false

market:
  polling_interval_seconds: 10   # check every 10s (1h candles, no rush)

strategy:
  name: "VolBreakout"
  timeframe: "1h"               # 1-hour candles (backtested timeframe)

  vol_breakout:
    # Bollinger Bands period: how many candles for SMA/StdDev
    bb_period: 22

    # Squeeze threshold: BB bandwidth (%) below which = squeeze
    # Lower = fewer but higher-quality squeezes
    squeeze_bw_pct: 2.0

  # Indicators: klines for BB + ATR (fetched via REST/WS)
  indicators:
    - name: "PriceSource"
      api: "Binance-Futures-REST"

  # Order book config (used for entry/exit pricing)
  order_book:
    depth_levels: 5

risk_management:
  initial_balance_usd: 1000.0
  risk_per_trade_pct: 0.015      # 1.5% risk per trade
  position_size_pct: 0.08        # legacy fallback
  max_daily_loss_pct: 0.04       # prop firm standard: 4%

  use_sl_tp: true
  use_hard_tp: true
  use_hard_sl: true

  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 1.75        # tighter SL -- breakout trades have clear invalidation
  atr_tp_multiplier: 4.0         # wide TP -- let breakouts run (R:R = 2.3)
  min_atr_pct: 0.0005            # block only dead-flat market
  min_sl_pct: 0.005              # minimum SL floor = 0.5%

  # Fallback fixed SL/TP (used when ATR unavailable)
  stop_loss_pct:   0.02
  take_profit_pct: 0.045

  sl_confirm_seconds: 10         # SL confirmation delay
  cooldown_after_sl_sec: 60      # 1 min cooldown after SL

  trailing_stop_enabled: true
  trailing_stop_atr_multiplier: 1.5
  breakeven_atr_multiplier: 1.0  # protect entry after 1xATR profit

  # Hold time: max 50 bars = 50 hours on 1h timeframe
  max_hold_time_minutes: 3000    # 50 hours
  use_time_stop: true
  time_stop_seconds: 7200        # 2h dead-zone cutoff
  time_stop_max_loss_pct: 0.005
  use_reverse_close: true        # close if price returns to BB mid

  # Funding guard: re-enable to avoid paying high funding
  max_funding_rate_bps: 50       # skip entry if funding > 50 bps

  btc_price_fallback: 95000.0

trading:
  use_ws: true
  use_binance_ws: true
  binance_ws_candle_history: 300  # need ~50 candles for BB, keep 300 for safety
  signal_confirmation_ticks: 2

simulation:
  state_file: "state.json"
  log_file:   "trades.csv"
  fee_simulation_pct:      0.0005
  slippage_simulation_pct: 0.0003
  market_impact_factor:    0.0005
  liquidity_fallback_usd:  50000.0
  partial_fill_min_pct:    0.90

endpoints:
  binance_futures:    "https://fapi.binance.com"
  binance_futures_ws: "wss://fstream.binance.com"
  telegram_bot_token: ""
  telegram_chat_id:   ""
  anthropic_api_key:  ""
